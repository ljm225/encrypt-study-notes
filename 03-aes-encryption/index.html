<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>方案三：AES-GCM 对称加密登录</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 520px;
        }
        h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 8px;
            text-align: center;
        }
        .subtitle {
            color: #888;
            font-size: 14px;
            text-align: center;
            margin-bottom: 32px;
        }
        .badge {
            display: inline-block;
            background: #e0f7fa;
            color: #006064;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #4facfe;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(79, 172, 254, 0.4);
        }
        .debug-panel {
            margin-top: 24px;
            background: #f5f5f5;
            border-radius: 8px;
            padding: 16px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }
        .debug-panel h3 {
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .debug-panel .row {
            margin-bottom: 6px;
        }
        .debug-panel .label {
            color: #888;
        }
        .debug-panel .value {
            color: #006064;
            word-break: break-all;
        }
        .info-box {
            background: #e3f2fd;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #1565c0;
            border-left: 4px solid #2196f3;
        }
        .status {
            padding: 8px 12px;
            border-radius: 6px;
            margin-top: 12px;
            font-size: 13px;
            display: none;
        }
        .status.success { display: block; background: #e8f5e9; color: #2e7d32; }
        .status.info { display: block; background: #e3f2fd; color: #1565c0; }
        .nav-links {
            text-align: center;
            margin-top: 20px;
        }
        .nav-links a {
            color: #4facfe;
            text-decoration: none;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">🔒 方案三</div>
        <h1>AES-GCM 对称加密登录</h1>
        <p class="subtitle">共享密钥 + 随机 IV 加密密码传输</p>

        <div class="info-box">
            🔑 前端使用服务端下发的 AES 密钥加密密码。
            AES-GCM 模式自带认证标签，防止密文被篡改。<br>
            <strong>⚠️ 局限性：</strong>密钥需要通过安全通道分发，
            因此必须配合 HTTPS 使用。
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn">🔐 加密并登录</button>
        </form>

        <div class="debug-panel">
            <h3>📋 AES-GCM 加密过程</h3>
            <div class="row">
                <span class="label">原始密码：</span>
                <span class="value" id="rawPwd">—</span>
            </div>
            <div class="row">
                <span class="label">AES 密钥(Hex)：</span>
                <span class="value" id="keyDisplay">—</span>
            </div>
            <div class="row">
                <span class="label">随机 IV(Hex)：</span>
                <span class="value" id="ivDisplay">—</span>
            </div>
            <div class="row">
                <span class="label">加密后密文(Base64)：</span>
                <span class="value" id="encryptedDisplay">—</span>
            </div>
            <div class="row" style="margin-top:8px;">
                <span class="label">认证标签(Hex)：</span>
                <span class="value" id="tagDisplay">—</span>
            </div>
            <div class="row" style="margin-top:8px;">
                <span style="color:#006064; font-size:11px;">
                    ✅ AES-GCM 同时提供机密性和完整性认证
                </span>
            </div>
        </div>

        <div id="status" class="status"></div>

        <div class="nav-links">
            <a href="../README.md">← 返回目录</a>
        </div>
    </div>

    <script>
        /**
         * ============================================
         *  方案三：AES-GCM 对称加密
         * ============================================
         *
         * 流程：
         * 1. 服务端生成 AES 密钥，通过 HTTPS 安全下发给前端
         * 2. 前端生成随机 IV（初始化向量）
         * 3. 使用 AES-GCM 模式加密密码（自动生成认证标签）
         * 4. 将 { 密文, IV, 认证标签 } 发送给服务端
         * 5. 服务端用相同的密钥 + IV 解密并验证完整性
         *
         * 安全说明：
         * - AES-256-GCM 是目前最安全的对称加密模式之一 ✅
         * - 认证标签可检测密文是否被篡改 ✅
         * - 密钥分发依赖 HTTPS，若无 HTTPS 则无安全性 ❌
         * - 每次加密使用不同的随机 IV ✅（防止重放）
         */

        // ==========================================
        // 工具函数：ArrayBuffer ↔ Hex / Base64
        // ==========================================
        function bufToHex(buffer) {
            return Array.from(new Uint8Array(buffer))
                .map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function bufToBase64(buffer) {
            const bytes = new Uint8Array(buffer);
            let binary = '';
            bytes.forEach(b => binary += String.fromCharCode(b));
            return btoa(binary);
        }

        function hexToBuf(hex) {
            const bytes = new Uint8Array(hex.length / 2);
            for (let i = 0; i < hex.length; i += 2) {
                bytes[i / 2] = parseInt(hex.substring(i, i + 2), 16);
            }
            return bytes.buffer;
        }

        // ==========================================
        // 模拟：服务端生成 AES-256 密钥
        // 实际项目中：由服务端生成并通过 API 下发（仅 HTTPS）
        // ==========================================
        async function getAESKeyFromServer() {
            // 生成 256 位随机密钥
            const keyBytes = crypto.getRandomValues(new Uint8Array(32));
            const key = await crypto.subtle.importKey(
                'raw',
                keyBytes,
                { name: 'AES-GCM' },
                false,  // 不可导出（实际项目中应为 true 因需要导出传输）
                ['encrypt', 'decrypt']
            );
            return { key, keyBytes };
        }

        // ==========================================
        // 核心：AES-GCM 加密
        // ==========================================
        async function encryptAESGCM(key, plaintext) {
            // 生成随机 IV（12 字节 = 96 位，GCM 推荐值）
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const encoder = new TextEncoder();
            const data = encoder.encode(plaintext);

            const encrypted = await crypto.subtle.encrypt(
                {
                    name: 'AES-GCM',
                    iv: iv,
                    additionalData: null,  // 可选附加认证数据
                    tagLength: 128         // 认证标签长度
                },
                key,
                data
            );

            // AES-GCM 输出格式：密文 || 认证标签（最后 16 字节）
            const encryptedBytes = new Uint8Array(encrypted);
            const ciphertext = encryptedBytes.slice(0, -16);    // 密文
            const authTag = encryptedBytes.slice(-16);          // 认证标签

            return { ciphertext, authTag, iv };
        }

        // ==========================================
        // 模拟：服务端解密验证
        // ==========================================
        async function decryptAESGCM(key, ciphertext, authTag, iv) {
            // 组合密文 + 认证标签
            const combined = new Uint8Array(ciphertext.length + authTag.length);
            combined.set(ciphertext);
            combined.set(authTag, ciphertext.length);

            const decrypted = await crypto.subtle.decrypt(
                {
                    name: 'AES-GCM',
                    iv: iv,
                    tagLength: 128
                },
                key,
                combined
            );

            const decoder = new TextDecoder();
            return decoder.decode(decrypted);
        }

        // ==========================================
        // 表单提交
        // ==========================================
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (!password) {
                alert('请输入密码');
                return;
            }

            const statusEl = document.getElementById('status');

            try {
                // 1. 获取 AES 密钥（模拟：从服务端获取）
                const { key, keyBytes } = await getAESKeyFromServer();
                document.getElementById('keyDisplay').textContent =
                    bufToHex(keyBytes).substring(0, 16) + '...';

                document.getElementById('rawPwd').textContent = password;

                // 2. 加密密码
                const { ciphertext, authTag, iv } = await encryptAESGCM(key, password);

                document.getElementById('ivDisplay').textContent = bufToHex(iv);
                document.getElementById('encryptedDisplay').textContent =
                    bufToBase64(ciphertext).substring(0, 30) + '...';
                document.getElementById('tagDisplay').textContent = bufToHex(authTag);

                // 3. 构造发送数据
                const payload = {
                    username: username,
                    ciphertext: bufToBase64(ciphertext),     // ✅ 加密后的密文
                    iv: bufToHex(iv),                         // ✅ 初始化向量
                    auth_tag: bufToHex(authTag),              // ✅ 认证标签
                };

                console.log('📤 实际发送的数据（Burp Suite 只能抓到这些）：');
                console.log(JSON.stringify(payload, null, 2));
                console.log('✅ 密码已被 AES-256-GCM 加密！');

                // 4. 模拟服务端解密
                const decrypted = await decryptAESGCM(key, ciphertext, authTag, iv);
                console.log('🔓 服务端解密结果:', decrypted);
                console.log('✅ 完整性验证通过, 密码匹配:', decrypted === password);

                statusEl.className = 'status success';
                statusEl.innerHTML = `
                    ✅ 登录请求已发送！<br>
                    🔓 服务端成功解密密码: <strong>${decrypted}</strong><br>
                    🛡️ AES-GCM 认证标签验证通过，数据未被篡改
                `;

            } catch (err) {
                console.error('加密失败:', err);
                statusEl.className = 'status info';
                statusEl.textContent = '❌ 加密失败: ' + err.message;
            }
        });
    </script>
</body>
</html>
